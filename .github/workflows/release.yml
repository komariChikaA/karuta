name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS dmg
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Resolve project version
        id: version
        run: echo "version=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)" >> "$GITHUB_OUTPUT"

      - name: Build JAR
        run: mvn -B clean package

      - name: Stage jpackage input
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          rm -rf target/staging
          mkdir -p target/staging

          # Thin application jar
          cp "target/karuta-jukebox-${VERSION}.jar" target/staging/

          # Runtime dependency jars (JavaFX platform-specific jars, etc.)
          cp target/lib/*.jar target/staging/

          # Config directory (template config.txt; music/images/decks are user data)
          cp -R src/main/resources/config target/staging/config

          echo "=== Staging directory contents ==="
          find target/staging -type f
          echo "=== Total staging size ==="
          du -sh target/staging

      - name: Create dmg
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          rm -rf target/package
          mkdir -p target/package
          jpackage \
            --type dmg \
            --input target/staging \
            --main-jar "karuta-jukebox-${VERSION}.jar" \
            --main-class ui.Launcher \
            --module-path target/staging \
            --add-modules javafx.controls,javafx.fxml,javafx.media,java.desktop \
            --name KarutaJukebox \
            --app-version "${VERSION}" \
            --dest target/package \
            --java-options "--enable-native-access=ALL-UNNAMED"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: karuta-jukebox-macos-dmg
          path: target/package/*.dmg

  build-windows:
    name: Build Windows exe
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Resolve project version
        id: version
        shell: powershell
        run: |
          $v = mvn -q -DforceStdout help:evaluate "-Dexpression=project.version"
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Install WiX Toolset
        shell: powershell
        run: |
          choco install wixtoolset -y --no-progress

      - name: Add WiX to PATH
        shell: powershell
        run: |
          $wixBin = Get-ChildItem -Path 'C:\Program Files (x86)', 'C:\Program Files' -Directory -Filter 'WiX Toolset*' -ErrorAction SilentlyContinue |
            ForEach-Object { Join-Path $_.FullName 'bin' } |
            Where-Object { Test-Path (Join-Path $_ 'candle.exe') } |
            Select-Object -First 1

          if ([string]::IsNullOrWhiteSpace($wixBin)) {
            throw 'WiX Toolset bin directory was not found.'
          }

          "WIX_BIN=$wixBin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$wixBin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Verify WiX tools
        shell: powershell
        run: |
          where.exe candle
          where.exe light

      - name: Build JAR
        shell: powershell
        run: mvn -B clean package

      - name: Stage jpackage input
        shell: powershell
        run: |
          $v = "${{ steps.version.outputs.version }}"

          # Create a clean staging directory — ONLY what jpackage needs
          $stage = "target/staging"
          if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
          New-Item -ItemType Directory -Force $stage | Out-Null

          # Thin application jar
          Copy-Item "target/karuta-jukebox-$v.jar" "$stage/"

          # Runtime dependency jars (JavaFX platform-specific jars, etc.)
          Copy-Item "target/lib/*.jar" "$stage/"

          # Config directory (template config.txt; music/images/decks are user data)
          Copy-Item -Recurse "src/main/resources/config" "$stage/config"

          # Verify staging contents
          Write-Host "=== Staging directory contents ==="
          Get-ChildItem -Recurse $stage | Format-Table FullName, Length

      - name: Create exe
        shell: powershell
        run: |
          $v = "${{ steps.version.outputs.version }}"
          if (Test-Path target/package) { Remove-Item -Recurse -Force target/package }
          New-Item -ItemType Directory -Force target/package | Out-Null
          jpackage `
            --type exe `
            --input target/staging `
            --main-jar "karuta-jukebox-$v.jar" `
            --main-class ui.Launcher `
            --module-path target/staging `
            --add-modules javafx.controls,javafx.fxml,javafx.media,java.desktop `
            --name KarutaJukebox `
            --app-version $v `
            --dest target/package `
            --java-options "--enable-native-access=ALL-UNNAMED" `
            --win-per-user-install `
            --win-dir-chooser `
            --win-menu

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: karuta-jukebox-windows-exe
          path: target/package/*.exe

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: karuta-jukebox-macos-dmg
          path: release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: karuta-jukebox-windows-exe
          path: release-assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: release-assets/*
          generate_release_notes: true
