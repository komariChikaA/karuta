name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS dmg
    runs-on: macos-13

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Resolve project version
        id: version
        run: echo "version=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)" >> "$GITHUB_OUTPUT"

      - name: Build JAR
        run: mvn -B clean package

      - name: Create dmg
        run: |
          rm -rf target/package
          mkdir -p target/package
          jpackage \
            --type dmg \
            --input target \
            --main-jar karuta-jukebox-${{ steps.version.outputs.version }}.jar \
            --main-class ui.Launcher \
            --name KarutaJukebox \
            --app-version ${{ steps.version.outputs.version }} \
            --dest target/package \
            --java-options --enable-native-access=ALL-UNNAMED

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: karuta-jukebox-macos-dmg
          path: target/package/*.dmg

  build-windows:
    name: Build Windows exe
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Resolve project version
        id: version
        shell: powershell
        run: |
          $version = mvn -q -DforceStdout help:evaluate -Dexpression=project.version
          $version = $version.Trim()
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Install WiX Toolset
        shell: powershell
        run: |
          choco install wixtoolset -y --no-progress

      - name: Build JAR
        shell: powershell
        run: mvn -B clean package

      - name: Create exe
        shell: powershell
        run: |
          if (Test-Path target/package) {
            Remove-Item -Recurse -Force target/package
          }
          New-Item -ItemType Directory -Force target/package | Out-Null
          jpackage `
            --type exe `
            --input target `
            --main-jar karuta-jukebox-${{ steps.version.outputs.version }}.jar `
            --main-class ui.Launcher `
            --name KarutaJukebox `
            --app-version ${{ steps.version.outputs.version }} `
            --dest target/package `
            --java-options --enable-native-access=ALL-UNNAMED

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: karuta-jukebox-windows-exe
          path: target/package/*.exe

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: karuta-jukebox-macos-dmg
          path: release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: karuta-jukebox-windows-exe
          path: release-assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: release-assets/*
          generate_release_notes: true